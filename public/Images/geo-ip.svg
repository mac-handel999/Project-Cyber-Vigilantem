<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120">
    <!-- Dark Background Grid Matrix -->
    <rect width="100" height="100" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Outer Target Radar Ring -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4 3"
            style="filter: drop-shadow(0px 0px 6px rgba(6, 182, 212, 0.3));"/>
    <circle cx="50" cy="50" r="15" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Scope Crosshairs Axis Lines -->
    <line x1="50" y1="12" x2="50" y2="88" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="12" y1="50" x2="88" y2="50" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Isolated Infrastructure Host Node Target -->
    <circle cx="62" cy="38" r="4" fill="#ffffff" style="filter: drop-shadow(0px 0px 6px #06b6d4);"/>
    <circle cx="62" cy="38" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5">
        <animate attributeName="r" values="4;12;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
    </circle>
</svg>
